<!DOCTYPE html>
<!-- OBAN VIEWER — このファイルを「パネル画像と同じフォルダ」に置いて開いてください（file://直開きOK）
     generated by OBAN BUILDER / ?attract=1 で自動再生・&hud=0 でバー非表示 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OBAN — oban</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c061d;overflow-x:hidden}
#sp{height:1343vh}
#stage{position:fixed;inset:0;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%}
#bar{position:fixed;top:0;left:0;height:2px;width:0%;background:#5AE9FF;z-index:9}
#gate{position:fixed;inset:0;background:#0c061d;color:#f2eefc;display:flex;justify-content:center;align-items:center;font-family:monospace;font-size:11px;letter-spacing:.3em;z-index:99;transition:opacity .5s}
#gate.done{opacity:0;pointer-events:none}
body.nohud #bar{display:none}
</style></head><body>
<div id="gate">LOADING PANELS…</div>
<div id="sp"></div>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="bar"></div>
<script>
'use strict';
const PROJ={"panels":[{"name":"OP_pose_book1_00031.png","x":-0.7254,"y":-1.3282,"h":0.82,"depth":0.5,"ar":1.7777777777777777},{"name":"OP_pose_book1_00030.png","x":-0.728,"y":-0.132,"h":0.4917501951999999,"depth":0.2,"ar":1.7777777777777777},{"name":"OP_pose_book1_00039.png","x":0.0583,"y":-0.0405,"h":0.8252563967999997,"depth":0.1,"ar":1.7777777777777777},{"name":"OP_pose_book1_00047.png","x":-0.9972,"y":0.9049,"h":0.82,"depth":0.4,"ar":1.7777777777777777}],"take":{"version":1,"name":"take-A","kf":[{"x":-0.878,"y":-0.19,"z":2.37,"dwell":1,"ease":"smooth"},{"x":-0.746,"y":-1.39,"z":1.301,"dwell":1,"ease":"smooth"},{"x":0.012,"y":-0.247,"z":1.864,"dwell":1,"ease":"smooth"},{"x":-1.08,"y":0.968,"z":1.023,"dwell":1,"ease":"smooth"}]}};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const map=(v,a,b,c=0,d=1)=>c+(d-c)*clamp((v-a)/(b-a),0,1);
const E={linear:t=>t,inout:t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2,smooth:t=>t*t*(3-2*t),outCubic:t=>1-Math.pow(1-t,3),inCubic:t=>t*t*t};
const Q=new URLSearchParams(location.search);
if(Q.get('hud')==='0')document.body.classList.add('nohud');
let VW=innerWidth,VH=innerHeight,DPR=Math.min(devicePixelRatio||1,2);
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
function onResize(){VW=innerWidth;VH=innerHeight;cv.width=Math.round(VW*DPR);cv.height=Math.round(VH*DPR);}
addEventListener('resize',onResize);onResize();
function buildTake(take){
  const kf=(take.kf&&take.kf.length)?take.kf:[{x:0,y:0,z:1,dwell:1}];
  const tw=d=>clamp(d,0.25,2.2);const segs=[];
  for(let i=0;i<kf.length;i++){
    segs.push({t:'dwell',a:kf[i],b:kf[i],w:Math.max(0.05,kf[i].dwell??1)});
    if(i<kf.length-1){const A=kf[i],B=kf[i+1];
      segs.push({t:'travel',a:A,b:B,ease:B.ease||'smooth',w:tw(Math.hypot(B.x-A.x,B.y-A.y)+Math.abs((B.z??1)-(A.z??1)))});}
  }
  const total=segs.reduce((s,x)=>s+x.w,0);let acc=0;
  for(const s of segs){s.p0=acc/total;acc+=s.w;s.p1=acc/total;}
  return{segs,total};
}
const TT=buildTake(PROJ.take);
function camAt(P){
  let seg=TT.segs[TT.segs.length-1];
  for(const s of TT.segs){if(P<=s.p1){seg=s;break;}}
  const f=map(P,seg.p0,seg.p1);
  if(seg.t==='travel'){const e=(E[seg.ease]||E.smooth)(f);
    return{x:lerp(seg.a.x,seg.b.x,e),y:lerp(seg.a.y,seg.b.y,e),z:clamp(lerp(seg.a.z??1,seg.b.z??1,e),0.25,4),segT:'travel'};}
  return{x:seg.a.x,y:seg.a.y,z:clamp(seg.a.z??1,0.25,4),segT:seg.t};
}
let loaded=0,ready=false;
const IM={};
for(const p of PROJ.panels){
  const img=new Image();
  img.onload=img.onerror=()=>{if(++loaded>=PROJ.panels.length){ready=true;document.getElementById('gate').classList.add('done');}};
  img.src='./'+p.name;IM[p.name]=img;
}
if(!PROJ.panels.length){ready=true;document.getElementById('gate').classList.add('done');}
let mx=0,my=0,mxT=0,myT=0;
addEventListener('mousemove',e=>{mxT=e.clientX/VW*2-1;myT=e.clientY/VH*2-1});
/* attract */
const attract={on:false,ret:false,retFrom:0,retT0:0,enabled:Q.get('attract')!=='0',dur:Math.max(20,parseFloat(Q.get('dur'))||90),loop:Q.get('loop')!=='0'};
let lastAct=performance.now();
['wheel','pointerdown','keydown'].forEach(ev=>addEventListener(ev,()=>{lastAct=performance.now();attract.on=false;attract.ret=false;},{passive:true}));
function attractUpdate(nowMs,dt){
  if(!attractUpdate.boot){attractUpdate.boot=1;if(Q.get('attract')==='1')attract.on=true;}
  if(!attract.on){if(attract.enabled&&ready&&nowMs-lastAct>45000)attract.on=true;return;}
  const max=document.documentElement.scrollHeight-VH;
  if(attract.ret){const t=clamp((nowMs-attract.retT0)/4200,0,1);scrollTo(0,attract.retFrom*(1-E.inout(t)));if(t>=1)attract.ret=false;return;}
  const P=clamp(scrollY/Math.max(max,1),0,1);
  if(P>=1){if(attract.loop){attract.ret=true;attract.retFrom=scrollY;attract.retT0=nowMs;}else attract.on=false;return;}
  const c=camAt(P);
  scrollTo(0,Math.min(max,scrollY+(max/attract.dur)*(c.segT==='dwell'?0.6:1)*dt));
}
let Pd=0;
function frame(nowMs){
  const dt=clamp((nowMs-(frame.last??nowMs))/1000,0,0.05);frame.last=nowMs;
  mx+=(mxT-mx)*0.08;my+=(myT-my)*0.08;
  attractUpdate(nowMs,dt);
  if(ready){
    const max=document.documentElement.scrollHeight-VH;
    const P=clamp(scrollY/Math.max(max,1),0,1);
    Pd+=(P-Pd)*0.16;if(Math.abs(P-Pd)<0.0004)Pd=P;
    const cam=camAt(Pd);
    const W=cv.width,H=cv.height;
    cx.clearRect(0,0,W,H);
    const list=[...PROJ.panels].sort((a,b)=>(a.depth??0.5)-(b.depth??0.5));
    for(const p of list){
      const eff=p.depth??0.5;
      const pf=lerp(0.7,1.2,eff),zi=1+(cam.z-1)*lerp(0.55,1.25,eff);
      const th=p.h*H*zi,tw=th*(p.ar||1.414);
      const x=W/2+(p.x-(cam.x+mx*0.01)*pf)*W*zi-tw/2;
      const y=H/2+(p.y-(cam.y+my*0.008)*pf)*H*zi-th/2;
      if(x>W||x+tw<0||y>H||y+th<0)continue;
      const img=IM[p.name];
      if(img&&img.complete&&img.naturalWidth)cx.drawImage(img,x,y,tw,th);
    }
    document.getElementById('bar').style.width=(Pd*100).toFixed(2)+'%';
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
