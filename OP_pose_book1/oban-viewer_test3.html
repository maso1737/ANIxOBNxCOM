<!DOCTYPE html>
<!-- OBAN VIEWER — このファイルを「パネル画像と同じフォルダ」に置いて開いてください（file://直開きOK）

<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OBAN — oban</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c061d;overflow-x:hidden}
#sp{height:1914vh}
#stage{position:fixed;inset:0;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%}
#bar{position:fixed;top:0;left:0;height:2px;width:0%;background:#5AE9FF;z-index:9}
#gate{position:fixed;inset:0;background:#0c061d;color:#f2eefc;display:flex;justify-content:center;align-items:center;font-family:monospace;font-size:11px;letter-spacing:.3em;z-index:99;transition:opacity .5s}
#gate.done{opacity:0;pointer-events:none}
body.nohud #bar{display:none}
</style></head><body>
<div id="gate">LOADING PANELS…</div>
<div id="sp"></div>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="bar"></div>
<script>
'use strict';
const PROJ={"panels":[{"name":"OP_pose_book1_00030.png","x":0.102,"y":0.5029,"h":0.82,"depth":0.15,"ord":1,"ar":1.7777777777777777,"parent":null,"seq":null},{"name":"OP_pose_book1_00031.png","x":0.6129,"y":1.0112,"h":1.3849473311999994,"depth":0.5,"ord":2,"ar":1.7777777777777777,"parent":null,"seq":null},{"name":"OP_pose_book1_00038.png","x":0.875,"y":1.1683,"h":0.82,"depth":0,"ord":3,"ar":1.7777777777777777,"parent":null,"seq":null},{"name":"OP_pose_book1_00040.png","x":-0.9528,"y":2.1066,"h":0.82,"depth":0.7,"ord":4,"ar":1.7777777777777777,"parent":null,"seq":null},{"name":"OP_pose_book1_00042.png","x":-0.1191,"y":2.1774,"h":0.82,"depth":0.5,"ord":5,"ar":1.7777777777777777,"parent":null,"seq":null},{"name":"OP_pose_book1_00047.png","x":-0.697,"y":1.04,"h":0.82,"depth":0.15,"ord":6,"ar":1.7777777777777777,"parent":null,"seq":null},{"name":"OP_pose_book1_*.png","x":0.1476,"y":0.0913,"h":0.8091226349846286,"depth":0.65,"ord":6,"ar":1.7777777777777777,"parent":"f6","seq":{"pre":"OP_pose_book1_","pad":5,"start":30,"n":18,"ext":"png","fps":12,"mode":"pingpong","trigger":"enter"}},{"name":"OP_start_book3_*.png","x":0.7843,"y":2.0347,"h":4,"depth":0.65,"ord":7,"ar":1.7777777777777777,"parent":null,"seq":{"pre":"OP_start_book3_","pad":5,"start":1,"n":25,"ext":"png","fps":10,"mode":"loop","trigger":"enter"}}],"frames":[{"id":"f6","name":"FRAME 01","x":1.6681,"y":2.3785,"h":1.5452607272509433,"depth":0.5,"ord":0,"ar":1.777,"quad":[{"x":0.294,"y":0.183},{"x":0.662,"y":0.183},{"x":0.803,"y":0.837},{"x":0.314,"y":0.855}],"par":0.5}],"take":{"version":1,"name":"take-A","kf":[{"x":0.145,"y":0.571,"z":1.864,"dwell":0.05,"ease":"outCubic"},{"x":0.671,"y":0.968,"z":1.653,"dwell":0.4,"ease":"inout"},{"x":1.3,"y":1.677,"z":1.301,"dwell":0.75,"ease":"smooth"},{"x":-0.93,"y":1.936,"z":1.301,"dwell":0.3,"ease":"inout"},{"x":-0.161,"y":2.256,"z":1.301,"dwell":1,"ease":"inout"},{"x":-0.973,"y":1.285,"z":1.654,"dwell":0.2,"ease":"outCubic"},{"x":1.844,"y":2.522,"z":0.907,"dwell":3,"ease":"inCubic"}]}};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const map=(v,a,b,c=0,d=1)=>c+(d-c)*clamp((v-a)/(b-a),0,1);
const E={linear:t=>t,inout:t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2,smooth:t=>t*t*(3-2*t),outCubic:t=>1-Math.pow(1-t,3),inCubic:t=>t*t*t};
const Q=new URLSearchParams(location.search);
if(Q.get('hud')==='0')document.body.classList.add('nohud');
let VW=innerWidth,VH=innerHeight,DPR=Math.min(devicePixelRatio||1,2);
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
function onResize(){VW=innerWidth;VH=innerHeight;cv.width=Math.round(VW*DPR);cv.height=Math.round(VH*DPR);}
addEventListener('resize',onResize);onResize();
function buildTake(take){
  const kf=(take.kf&&take.kf.length)?take.kf:[{x:0,y:0,z:1,dwell:1}];
  const tw=d=>clamp(d,0.25,2.2);const segs=[];
  for(let i=0;i<kf.length;i++){
    segs.push({t:'dwell',a:kf[i],b:kf[i],w:Math.max(0.05,kf[i].dwell??1)});
    if(i<kf.length-1){const A=kf[i],B=kf[i+1];
      segs.push({t:'travel',a:A,b:B,ease:B.ease||'smooth',w:tw(Math.hypot(B.x-A.x,B.y-A.y)+Math.abs((B.z??1)-(A.z??1)))});}
  }
  const total=segs.reduce((s,x)=>s+x.w,0);let acc=0;
  for(const s of segs){s.p0=acc/total;acc+=s.w;s.p1=acc/total;}
  return{segs,total};
}
const TT=buildTake(PROJ.take);
function camAt(P){
  let seg=TT.segs[TT.segs.length-1];
  for(const s of TT.segs){if(P<=s.p1){seg=s;break;}}
  const f=map(P,seg.p0,seg.p1);
  if(seg.t==='travel'){const e=(E[seg.ease]||E.smooth)(f);
    return{x:lerp(seg.a.x,seg.b.x,e),y:lerp(seg.a.y,seg.b.y,e),z:clamp(lerp(seg.a.z??1,seg.b.z??1,e),0.25,4),segT:'travel'};}
  return{x:seg.a.x,y:seg.a.y,z:clamp(seg.a.z??1,0.25,4),segT:seg.t};
}
/* loader: 単品+シーケンス全フレーム (V2-B) */
const IM={};let total=0,loaded=0,ready=false;
function done(){ready=true;document.getElementById('gate').classList.add('done');}
function addLoad(name){total++;const img=new Image();img.onload=img.onerror=function(){if(++loaded>=total)done();};img.src='./'+name;IM[name]=img;}
const seqFile=function(s,i){return s.pre+String(s.start+i).padStart(s.pad,'0')+'.'+s.ext;};
for(const p of PROJ.panels){if(p.seq){for(let i=0;i<p.seq.n;i++)addLoad(seqFile(p.seq,i));}else addLoad(p.name);}
if(!total)done();
/* シーケンス再生 (V2-B): loop / once / pingpong × always / enter */
function seqIdx(p,tS,vis){
  const s=p.seq;
  function wave(t){const f=Math.floor(t*s.fps);if(s.mode==='pingpong'){const m=Math.max(2*s.n-2,1);const k=f%m;return k<s.n?k:m-k;}return f%s.n;}
  if(s.trigger==='enter'){
    if(vis<=0){p._t0=null;return 0;}
    if(p._t0==null&&vis>=0.3)p._t0=tS;
    if(p._t0==null)return 0;
    const t=tS-p._t0;
    return s.mode==='once'?Math.min(Math.floor(t*s.fps),s.n-1):wave(t);
  }
  return s.mode==='once'?Math.min(Math.floor(tS*s.fps),s.n-1):wave(tS);
}
function panelImg(p,tS,vis){
  if(!p.seq)return IM[p.name];
  const i=Math.max(0,Math.min(seqIdx(p,tS,vis),p.seq.n-1));
  return IM[seqFile(p.seq,i)];
}
const bySort=(a,b)=>((a.depth??0.5)-(b.depth??0.5))||((a.ord??0)-(b.ord??0));
function rect(o,cam,W,H){
  const eff=o.depth??0.5;
  const pf=lerp(0.7,1.2,eff),zi=1+(cam.z-1)*lerp(0.55,1.25,eff);
  const th=o.h*H*zi,tw=th*(o.ar||1.414);
  return{x:W/2+(o.x-cam.x*pf)*W*zi-tw/2,y:H/2+(o.y-cam.y*pf)*H*zi-th/2,w:tw,h:th};
}
function childRect(c,f,R,cam){
  const lx=(cam.x-f.x)*(f.par??0.6),ly=(cam.y-f.y)*(f.par??0.6);
  const k=lerp(0.15,0.85,1-(c.depth??0.5));
  const th=c.h*R.h,tw=th*(c.ar||1.414);
  return{x:R.x+R.w/2+(c.x-lx*k)*R.h-tw/2,y:R.y+R.h/2+(c.y-ly*k)*R.h-th/2,w:tw,h:th};
}
function visFrac(r,W,H){
  const ix=Math.max(0,Math.min(r.x+r.w,W)-Math.max(r.x,0));
  const iy=Math.max(0,Math.min(r.y+r.h,H)-Math.max(r.y,0));
  return ix*iy/Math.max(r.w*r.h,1);
}
function drawP(p,r,tS,W,H){
  const img=panelImg(p,tS,visFrac(r,W,H));
  if(img&&img.complete&&img.naturalWidth)cx.drawImage(img,r.x,r.y,r.w,r.h);
}
let mx=0,my=0,mxT=0,myT=0;
addEventListener('mousemove',e=>{mxT=e.clientX/VW*2-1;myT=e.clientY/VH*2-1});
/* attract */
const attract={on:false,ret:false,retFrom:0,retT0:0,enabled:Q.get('attract')!=='0',dur:Math.max(20,parseFloat(Q.get('dur'))||90),loop:Q.get('loop')!=='0'};
let lastAct=performance.now();
['wheel','pointerdown','keydown'].forEach(ev=>addEventListener(ev,()=>{lastAct=performance.now();attract.on=false;attract.ret=false;},{passive:true}));
function attractUpdate(nowMs,dt){
  if(!attractUpdate.boot){attractUpdate.boot=1;if(Q.get('attract')==='1')attract.on=true;}
  if(!attract.on){if(attract.enabled&&ready&&nowMs-lastAct>45000)attract.on=true;return;}
  const max=document.documentElement.scrollHeight-VH;
  if(attract.ret){const t=clamp((nowMs-attract.retT0)/4200,0,1);scrollTo(0,attract.retFrom*(1-E.inout(t)));if(t>=1)attract.ret=false;return;}
  const P=clamp(scrollY/Math.max(max,1),0,1);
  if(P>=1){if(attract.loop){attract.ret=true;attract.retFrom=scrollY;attract.retT0=nowMs;}else attract.on=false;return;}
  const c=camAt(P);
  scrollTo(0,Math.min(max,scrollY+(max/attract.dur)*(c.segT==='dwell'?0.6:1)*dt));
}
let Pd=0;
function frame(nowMs){
  const dt=clamp((nowMs-(frame.last??nowMs))/1000,0,0.05);frame.last=nowMs;
  const tS=nowMs/1000;
  mx+=(mxT-mx)*0.08;my+=(myT-my)*0.08;
  attractUpdate(nowMs,dt);
  if(ready){
    const max=document.documentElement.scrollHeight-VH;
    const P=clamp(scrollY/Math.max(max,1),0,1);
    Pd+=(P-Pd)*0.16;if(Math.abs(P-Pd)<0.0004)Pd=P;
    const cam={x:camAt(Pd).x+mx*0.01,y:camAt(Pd).y+my*0.008,z:camAt(Pd).z};
    const W=cv.width,H=cv.height;
    cx.clearRect(0,0,W,H);
    const items=[].concat(PROJ.panels.filter(p=>!p.parent),PROJ.frames||[]).sort(bySort);
    for(const o of items){
      const R=rect(o,cam,W,H);
      if(R.x>W+R.w||R.x+R.w<-R.w||R.y>H+R.h||R.y+R.h<-R.h)continue;
      if(o.quad){   // FRAME: quadマスク+内部パララックス
        cx.save();
        cx.beginPath();
        o.quad.forEach(function(q,i){const px=R.x+q.x*R.w,py=R.y+q.y*R.h;i?cx.lineTo(px,py):cx.moveTo(px,py);});
        cx.closePath();cx.clip();
        const kids=PROJ.panels.filter(p=>p.parent===o.id).sort(bySort);
        for(const c of kids)drawP(c,childRect(c,o,R,cam),tS,W,H);
        cx.restore();
      }else drawP(o,R,tS,W,H);
    }
    document.getElementById('bar').style.width=(Pd*100).toFixed(2)+'%';
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
