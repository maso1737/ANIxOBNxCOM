<script>

/* ===== SATSUEI FX CORE (satsuei-fx-kit) ===== */
/* ============================================================
 * SATSUEI FX CORE — 撮影処理キット 正準参照実装 (v1)
 * ------------------------------------------------------------
 * 単一HTMLに <script> としてそのまま複製して使う（共有ライブラリ化しない方針）。
 * 依存ゼロ / WebGL1（ほぼ全ブラウザ対応）/ WebGL不可なら available=false で素通し。
 * fxParams のスキーマ（SPEC_06_SATSUEI_KIT.md §2 が正）:
 *   { version:1, enabled:true, chain:[ {t:'diffusion', on:true, p:{...}}, ... ] }
 * ============================================================ */
'use strict';

/* ---------- 既定パラメータ（新規プロジェクトの初期値） ---------- */
function makeDefaultFx(){
  return {
    version: 1,
    enabled: false,
    chain: [
      { t:'mb',        on:false, p:{ shutter:180, samples:8, rtStrength:1.0 } },
      { t:'dof',       on:false, p:{ focusZ:0, range:400, maxBlur:12 } },
      { t:'olm',       on:false, p:{ threshold:0.10, radius:1.2, strength:0.8 } },
      { t:'diffusion', on:true,  p:{ threshold:0.55, radius:1.0, gain:0.8, mode:0 } },
      { t:'para',      on:false, p:{ angle:120, c1:'#ffc890', a1:0.30, c2:'#281866', a2:0.25, mid:0.5, soft:0.45 } },
      { t:'grade',     on:true,  p:{ lift:0.0, gamma:1.0, gain:1.0, sat:1.0, temp:0.0 } },
      { t:'vignette',  on:true,  p:{ amount:0.25, soft:0.55 } },
      { t:'grain',     on:true,  p:{ amount:0.06, size:1.5, mono:1 } },
      { t:'glitch',    on:false, p:{ amount:0.15, bands:24, rgb:0.5, speed:8 } }
    ]
  };
}

/* ---------- FX定義レジストリ ----------
 * 新エフェクト追加: 1.FX_DEFS 2.FRAG 3.apply switch 4.makeDefaultFx chain の4点セット。
 * UI はホストが FX_DEFS から自動生成するので、ホスト側UIの改修は不要。 */
const FX_DEFS = {
  mb:        { label:'MOTION BLUR', tier:'temporal+frame',
               ui:[ {k:'shutter',label:'SHUTTER°',min:0,max:360,step:5},
                    {k:'samples',label:'SAMPLES(final)',min:2,max:32,step:1},
                    {k:'rtStrength',label:'RT STRENGTH',min:0,max:2,step:0.05} ] },
  dof:       { label:'DEPTH OF FIELD', tier:'layer',
               ui:[ {k:'focusZ',label:'FOCUS Z',min:-800,max:2000,step:10},
                    {k:'range',label:'RANGE',min:50,max:2000,step:10},
                    {k:'maxBlur',label:'MAX BLUR px',min:0,max:40,step:1} ] },
  olm:       { label:'SMOOTHER (OLM風・線なめし)', tier:'frame',
               ui:[ {k:'threshold',label:'EDGE TH',min:0.01,max:0.5,step:0.01},
                    {k:'radius',label:'RADIUS px',min:0.5,max:3,step:0.1},
                    {k:'strength',label:'STRENGTH',min:0,max:1,step:0.05} ] },
  diffusion: { label:'DIFFUSION / GLOW', tier:'frame',
               ui:[ {k:'threshold',label:'THRESHOLD',min:0,max:1,step:0.01},
                    {k:'radius',label:'RADIUS',min:0.2,max:3,step:0.05},
                    {k:'gain',label:'GAIN',min:0,max:2,step:0.05},
                    {k:'mode',label:'MODE 0=SCREEN 1=ADD',min:0,max:1,step:1} ] },
  para:      { label:'PARA (パラフィン)', tier:'frame',
               ui:[ {k:'angle',label:'ANGLE°',min:0,max:360,step:5},
                    {k:'a1',label:'ALPHA 1',min:0,max:1,step:0.01},
                    {k:'a2',label:'ALPHA 2',min:0,max:1,step:0.01},
                    {k:'mid',label:'MID',min:0,max:1,step:0.01},
                    {k:'soft',label:'SOFT',min:0.02,max:1,step:0.01} ],
               colors:['c1','c2'] },
  grade:     { label:'GRADE (色調)', tier:'frame',
               ui:[ {k:'lift',label:'LIFT',min:-0.3,max:0.3,step:0.005},
                    {k:'gamma',label:'GAMMA',min:0.3,max:2.4,step:0.01},
                    {k:'gain',label:'GAIN',min:0.3,max:2,step:0.01},
                    {k:'sat',label:'SAT',min:0,max:2,step:0.01},
                    {k:'temp',label:'TEMP',min:-1,max:1,step:0.01} ] },
  vignette:  { label:'VIGNETTE', tier:'frame',
               ui:[ {k:'amount',label:'AMOUNT',min:0,max:1,step:0.01},
                    {k:'soft',label:'SOFT',min:0.05,max:1,step:0.01} ] },
  grain:     { label:'GRAIN', tier:'frame',
               ui:[ {k:'amount',label:'AMOUNT',min:0,max:0.4,step:0.005},
                    {k:'size',label:'SIZE',min:1,max:4,step:0.5},
                    {k:'mono',label:'MONO 0/1',min:0,max:1,step:1} ] },
  glitch:    { label:'GLITCH', tier:'frame',
               ui:[ {k:'amount',label:'AMOUNT',min:0,max:1,step:0.01},
                    {k:'bands',label:'BANDS',min:4,max:64,step:1},
                    {k:'rgb',label:'RGB SHIFT',min:0,max:2,step:0.05},
                    {k:'speed',label:'SPEED',min:0,max:30,step:0.5} ] }
};

/* ---------- layer型ヘルパ: DOF ---------- */
function dofBlurPx(z, p){
  const d = Math.abs((z||0) - (p.focusZ||0));
  const r = d / Math.max(1, p.range||400);
  return Math.min(p.maxBlur||12, r * (p.maxBlur||12));
}

/* ---------- 本体 ---------- */
function createSatsueiFX(opts){
  opts = opts || {};
  const cvs = document.createElement('canvas');
  const glOpts = { premultipliedAlpha:false, preserveDrawingBuffer:true, antialias:false };
  const gl = cvs.getContext('webgl', glOpts) || cvs.getContext('experimental-webgl', glOpts);
  const api = { available: !!gl, canvas: cvs, defs: FX_DEFS, apply: null, destroy: null };
  if(!gl){ api.apply = (src)=>src; api.destroy = ()=>{}; return api; }

  const VERT = 'attribute vec2 aP;varying vec2 vUv;void main(){vUv=aP*0.5+0.5;gl_Position=vec4(aP,0.,1.);}';
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

  function compile(fsrc){
    const p = gl.createProgram();
    const mk = (type, src)=>{
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error('[SatsueiFX] shader: '+gl.getShaderInfoLog(s)+'\n'+src);
      gl.attachShader(p, s); return s;
    };
    mk(gl.VERTEX_SHADER, VERT); mk(gl.FRAGMENT_SHADER, 'precision mediump float;varying vec2 vUv;'+fsrc);
    gl.bindAttribLocation(p, 0, 'aP'); gl.linkProgram(p);
    if(!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error('[SatsueiFX] link: '+gl.getProgramInfoLog(p));
    return p;
  }

  /* 座標系: アップロード時 UNPACK_FLIP_Y_WEBGL=true。y下向き計算は pd=vec2(vUv.x, 1.0-vUv.y) */
  const FRAG = {
    copy: 'uniform sampler2D uT;void main(){gl_FragColor=texture2D(uT,vUv);}',
    bright: 'uniform sampler2D uT;uniform float uTh;\n'+
      'void main(){vec3 c=texture2D(uT,vUv).rgb;float l=dot(c,vec3(.299,.587,.114));\n'+
      'gl_FragColor=vec4(c*smoothstep(uTh,uTh+.25,l),1.);}',
    blur: 'uniform sampler2D uT;uniform vec2 uDir;\n'+
      'void main(){vec3 c=texture2D(uT,vUv).rgb*.2270270270;\n'+
      'c+=texture2D(uT,vUv+uDir*1.3846153846).rgb*.3162162162;\n'+
      'c+=texture2D(uT,vUv-uDir*1.3846153846).rgb*.3162162162;\n'+
      'c+=texture2D(uT,vUv+uDir*3.2307692308).rgb*.0702702703;\n'+
      'c+=texture2D(uT,vUv-uDir*3.2307692308).rgb*.0702702703;\n'+
      'gl_FragColor=vec4(c,1.);}',
    mixglow: 'uniform sampler2D uT;uniform sampler2D uG;uniform float uGain;uniform float uMode;\n'+
      'void main(){vec3 b=texture2D(uT,vUv).rgb;vec3 g=texture2D(uG,vUv).rgb*uGain;\n'+
      'vec3 scr=1.-(1.-b)*(1.-clamp(g,0.,1.));\n'+
      'gl_FragColor=vec4(mix(scr,b+g,uMode),1.);}',
    dirblur: 'uniform sampler2D uT;uniform vec2 uVel;\n'+
      'void main(){vec3 c=vec3(0.);\n'+
      'for(int i=0;i<8;i++){float t=(float(i)+.5)/8.-.5;c+=texture2D(uT,vUv+uVel*t).rgb;}\n'+
      'gl_FragColor=vec4(c/8.,1.);}',
    olm: 'uniform sampler2D uT;uniform vec2 uRes;uniform float uTh;uniform float uRad;uniform float uStr;\n'+
      'float lm(vec2 p){return dot(texture2D(uT,p).rgb,vec3(.299,.587,.114));}\n'+
      'void main(){vec2 px=uRad/uRes;\n'+
      'float lN=lm(vUv+vec2(0.,px.y));float lS=lm(vUv-vec2(0.,px.y));\n'+
      'float lE=lm(vUv+vec2(px.x,0.));float lW=lm(vUv-vec2(px.x,0.));\n'+
      'vec2 g=vec2(lE-lW,lN-lS);float gm=length(g);\n'+
      'vec3 base=texture2D(uT,vUv).rgb;\n'+
      'if(gm<uTh){gl_FragColor=vec4(base,1.);return;}\n'+
      'vec2 dir=normalize(vec2(-g.y,g.x))*px;\n'+
      'vec3 c=base*.34;\n'+
      'c+=texture2D(uT,vUv+dir).rgb*.245;c+=texture2D(uT,vUv-dir).rgb*.245;\n'+
      'c+=texture2D(uT,vUv+dir*2.).rgb*.085;c+=texture2D(uT,vUv-dir*2.).rgb*.085;\n'+
      'float w=uStr*smoothstep(uTh,uTh*2.,gm);\n'+
      'gl_FragColor=vec4(mix(base,c,w),1.);}',
    para: 'uniform sampler2D uT;uniform vec2 uDirG;uniform vec3 uC1;uniform vec3 uC2;\n'+
      'uniform float uA1;uniform float uA2;uniform float uMid;uniform float uSoft;\n'+
      'void main(){vec3 b=texture2D(uT,vUv).rgb;vec2 pd=vec2(vUv.x,1.-vUv.y);\n'+
      'float t=dot(pd-.5,uDirG)+.5;float m=smoothstep(uMid-uSoft*.5,uMid+uSoft*.5,t);\n'+
      'vec3 ov=mix(uC1,uC2,m);float a=mix(uA1,uA2,m);\n'+
      'gl_FragColor=vec4(1.-(1.-b)*(1.-ov*a),1.);}',
    grade: 'uniform sampler2D uT;uniform float uLift;uniform float uGamma;uniform float uGain;\n'+
      'uniform float uSat;uniform float uTemp;\n'+
      'void main(){vec3 c=texture2D(uT,vUv).rgb;\n'+
      'c=pow(max(c*uGain+uLift,0.),vec3(1./uGamma));\n'+
      'c.r+=uTemp*.08;c.b-=uTemp*.08;\n'+
      'float l=dot(c,vec3(.299,.587,.114));c=mix(vec3(l),c,uSat);\n'+
      'gl_FragColor=vec4(clamp(c,0.,1.),1.);}',
    finish: 'uniform sampler2D uT;uniform vec2 uRes;uniform float uTime;\n'+
      'uniform float uVigA;uniform float uVigS;uniform float uGrA;uniform float uGrS;uniform float uMono;\n'+
      'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7))+uTime*57.)*43758.5453);}\n'+
      'void main(){vec3 c=texture2D(uT,vUv).rgb;\n'+
      'float d=distance(vUv,vec2(.5))*1.41421356;\n'+
      'c*=1.-uVigA*smoothstep(1.-uVigS,1.,d);\n'+
      'vec2 gp=floor(vUv*uRes/max(uGrS,1.));\n'+
      'vec3 n=vec3(h(gp),h(gp+7.1),h(gp+13.7))*2.-1.;\n'+
      'n=mix(n,vec3(n.x),uMono);c+=n*uGrA;\n'+
      'gl_FragColor=vec4(clamp(c,0.,1.),1.);}',
    glitch: 'uniform sampler2D uT;uniform float uTime;uniform float uAmt;uniform float uBands;\n'+
      'uniform float uRgb;uniform vec2 uRes;\n'+
      'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}\n'+
      'void main(){float band=floor(vUv.y*uBands);\n'+
      'float r=h(vec2(band,floor(uTime)));\n'+
      'float on=step(1.-uAmt*.35,r);\n'+
      'float off=(h(vec2(band,floor(uTime)+.5))-.5)*.2*uAmt*on;\n'+
      'vec2 uv=vec2(vUv.x+off,vUv.y);\n'+
      'float sh=uRgb*2./uRes.x*(1.+on*6.);\n'+
      'gl_FragColor=vec4(texture2D(uT,uv+vec2(sh,0.)).r,texture2D(uT,uv).g,texture2D(uT,uv-vec2(sh,0.)).b,1.);}'
  };
  const PROG = {}; for(const k in FRAG) PROG[k] = compile(FRAG[k]);
  const U = (p,n)=>gl.getUniformLocation(p,n);

  function makeTarget(w,h){
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return { tex, fbo, w, h };
  }
  let W=0, H=0, srcTex=null, ping=null, pong=null, q1=null, q2=null;
  function resize(w,h){
    if(w===W && h===H) return;
    W=w; H=h; cvs.width=w; cvs.height=h;
    [ping,pong,q1,q2].forEach(t=>{ if(t){ gl.deleteTexture(t.tex); gl.deleteFramebuffer(t.fbo); } });
    ping=makeTarget(w,h); pong=makeTarget(w,h);
    const qw=Math.max(2,w>>2), qh=Math.max(2,h>>2);
    q1=makeTarget(qw,qh); q2=makeTarget(qw,qh);
    if(srcTex) gl.deleteTexture(srcTex);
    srcTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, srcTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  }

  function bindDraw(prog, srcT, target){
    gl.useProgram(prog);
    gl.bindFramebuffer(gl.FRAMEBUFFER, target ? target.fbo : null);
    gl.viewport(0, 0, target?target.w:W, target?target.h:H);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, srcT);
    gl.uniform1i(U(prog,'uT'), 0);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  const hex2rgb = s=>{ const n=parseInt(String(s).replace('#',''),16)||0;
    return [ ((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255 ]; };

  api.apply = function(src, fx, info){
    if(!fx || !fx.enabled) return src;
    const w = src.width, h = src.height;
    resize(w, h);
    info = info || {};
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    /* ストレートαのキワ荒れ対策: 乗算済み(premultiplied)でアップロード。半透明エッジの
       RGB増幅（AEストレート書き出し様のハロー/リング）を防ぐ。不透明ソースには影響なし */
    gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
    gl.bindTexture(gl.TEXTURE_2D, srcTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src);
    let cur = srcTex, curIsPing = false;
    const next = ()=>{ curIsPing = !curIsPing; return curIsPing ? ping : pong; };
    const active = (fx.chain||[]).filter(e=>e && e.on && FX_DEFS[e.t]);
    (fx.chain||[]).forEach(e=>{ if(e && e.on && !FX_DEFS[e.t]) console.warn('[SatsueiFX] unknown effect:', e.t); });
    for(const e of active){
      const p = e.p || {};
      let t;
      switch(e.t){
        case 'mb': {
          const k = (p.rtStrength==null?1:p.rtStrength);
          const vx=(info.velX||0)*k, vy=(info.velY||0)*k;
          if(Math.abs(vx)<1e-5 && Math.abs(vy)<1e-5) break;
          t = next(); gl.useProgram(PROG.dirblur);
          gl.uniform2f(U(PROG.dirblur,'uVel'), vx, -vy);
          bindDraw(PROG.dirblur, cur, t); cur = t.tex; break; }
        case 'diffusion': {
          gl.useProgram(PROG.bright);
          gl.uniform1f(U(PROG.bright,'uTh'), p.threshold==null?0.55:p.threshold);
          bindDraw(PROG.bright, cur, q1);
          const rad = (p.radius==null?1:p.radius);
          for(let i=0;i<2;i++){
            gl.useProgram(PROG.blur);
            gl.uniform2f(U(PROG.blur,'uDir'), rad*(i+1)/q1.w, 0);
            bindDraw(PROG.blur, q1.tex, q2);
            gl.useProgram(PROG.blur);
            gl.uniform2f(U(PROG.blur,'uDir'), 0, rad*(i+1)/q1.h);
            bindDraw(PROG.blur, q2.tex, q1);
          }
          t = next(); gl.useProgram(PROG.mixglow);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, q1.tex);
          gl.uniform1i(U(PROG.mixglow,'uG'), 1);
          gl.uniform1f(U(PROG.mixglow,'uGain'), p.gain==null?0.8:p.gain);
          gl.uniform1f(U(PROG.mixglow,'uMode'), p.mode||0);
          gl.activeTexture(gl.TEXTURE0);
          bindDraw(PROG.mixglow, cur, t); cur = t.tex; break; }
        case 'olm': { /* エッジ接線方向のなめし＝線の断面を保ちつつジャギを取る（OLMスムーザー風） */
          t = next(); gl.useProgram(PROG.olm);
          gl.uniform2f(U(PROG.olm,'uRes'), W, H);
          gl.uniform1f(U(PROG.olm,'uTh'), Math.max(0.005,p.threshold==null?0.1:p.threshold));
          gl.uniform1f(U(PROG.olm,'uRad'), Math.max(0.1,p.radius==null?1.2:p.radius));
          gl.uniform1f(U(PROG.olm,'uStr'), p.strength==null?0.8:p.strength);
          bindDraw(PROG.olm, cur, t); cur = t.tex; break; }
        case 'para': {
          t = next(); gl.useProgram(PROG.para);
          const a=(p.angle||0)*Math.PI/180;
          gl.uniform2f(U(PROG.para,'uDirG'), Math.cos(a), Math.sin(a));
          gl.uniform3fv(U(PROG.para,'uC1'), hex2rgb(p.c1||'#ffc890'));
          gl.uniform3fv(U(PROG.para,'uC2'), hex2rgb(p.c2||'#281866'));
          gl.uniform1f(U(PROG.para,'uA1'), p.a1==null?0.3:p.a1);
          gl.uniform1f(U(PROG.para,'uA2'), p.a2==null?0.25:p.a2);
          gl.uniform1f(U(PROG.para,'uMid'), p.mid==null?0.5:p.mid);
          gl.uniform1f(U(PROG.para,'uSoft'), Math.max(0.02,p.soft==null?0.45:p.soft));
          bindDraw(PROG.para, cur, t); cur = t.tex; break; }
        case 'grade': {
          t = next(); gl.useProgram(PROG.grade);
          gl.uniform1f(U(PROG.grade,'uLift'), p.lift||0);
          gl.uniform1f(U(PROG.grade,'uGamma'), Math.max(0.05,p.gamma==null?1:p.gamma));
          gl.uniform1f(U(PROG.grade,'uGain'), p.gain==null?1:p.gain);
          gl.uniform1f(U(PROG.grade,'uSat'), p.sat==null?1:p.sat);
          gl.uniform1f(U(PROG.grade,'uTemp'), p.temp||0);
          bindDraw(PROG.grade, cur, t); cur = t.tex; break; }
        case 'glitch': {
          t = next(); gl.useProgram(PROG.glitch);
          gl.uniform1f(U(PROG.glitch,'uTime'), (info.t||0)*(p.speed==null?8:p.speed));
          gl.uniform1f(U(PROG.glitch,'uAmt'), p.amount==null?0.15:p.amount);
          gl.uniform1f(U(PROG.glitch,'uBands'), Math.max(1,p.bands||24));
          gl.uniform1f(U(PROG.glitch,'uRgb'), p.rgb==null?0.5:p.rgb);
          gl.uniform2f(U(PROG.glitch,'uRes'), W, H);

function seqIdx(p,tS,vis){
